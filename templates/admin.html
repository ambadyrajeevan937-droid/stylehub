<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6f8;
}

.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #111827;
    color: #fff;
    padding: 20px;
}

.logo {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    padding: 12px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 8px;
}

.sidebar ul li:hover,
.sidebar ul li.active {
    background: #2563eb;
}

.logout {
    background: #dc2626;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* Topbar */
.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 30px;
}

.card {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card p {
    font-size: 24px;
    color: #2563eb;
    margin-top: 10px;
}

/* Form */
.form-section {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 30px;
}

.form-section form {
    display: grid;
    gap: 12px;
}

.form-section input,
.form-section textarea {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.form-section button {
    background: #2563eb;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* Table */
.table-section {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

table th, table td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

table th {
    background: #f1f5f9;
}

a{
    text-decoration: none;
    color: white;
}



</style>
<body>

<div class="container">
    {% include 'bar.html' %}
    <!-- Main Content -->
    <main class="main">
        <header class="topbar">
            <h1>Dashboard</h1>
            <span>Welcome, Admin</span>
        </header>

        <!-- Cards -->
        <section class="cards">
            <div class="card">
                <h3>Total Products</h3>
                <p>120</p>
            </div>
            <div class="card">
                <h3>Total Orders</h3>
                <p>45</p>
            </div>
            <div class="card">
                <h3>Users</h3>
                <p>80</p>
            </div>
            <div class="card">
                <h3>Revenue</h3>
                <p>₹25,000</p>
            </div>
        </section>

       

      
    </main>
</div>

</body>
</html>
