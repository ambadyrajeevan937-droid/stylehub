<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% if messages %}
    {% for message in messages %}
        <script>
            Swal.fire({
                icon: "{{ message.tags }}",  // success, error
                title: "{{ message }}",
                showConfirmButton: true,
                timer: 2000
            });
        </script>
    {% endfor %}
{% endif %}
