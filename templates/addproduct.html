<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(120deg, #ffffff, #b0abc2);
            display: flex;

            
            
        }

        .card {
            width: 450px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            margin-left: 600px;
            
        }

        .card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1f2d3d;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-size: 13px;
            color: #2f3e4e;
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        input,
        textarea {
            width: 100%;
            padding: 11px 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            color: #333;
        }

        textarea {
            resize: none;
            height: 85px;
        }

        input[type="file"] {
            padding: 8px;
        }

        input:focus,
        textarea:focus {
            box-shadow: 0 0 0 2px rgba(79, 172, 254, 0.6);
        }

        .btn {
            margin-top: 15px;
            width: 100%;
            padding: 13px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg,  #764ba2);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(79, 172, 254, 0.5);
        }
        .main {
    margin-left: 240px; /* SAME as sidebar width */
    padding: 20px;
}

    
    </style>
</head>

<body>

    {% include 'bar.html' %}


<div class="card">
    <h2>Add New Product</h2>

    <form  action="addproduct" method="POST" enctype="multipart/form-data">
         {% csrf_token %}

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="product_name" placeholder="Eg: Cotton Shirt" required>
        </div>

        <div class="form-group">
            <label>Price</label>
            <input type="number" step="0.01" name="price" placeholder="₹ Price" required>
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input type="number" name="quantity" placeholder="Stock available" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="Short product description"></textarea>
        </div>

        <div class="form-group">
            <label>Upload Image</label>
            <input type="file" name="image" >
        </div>
         <div class="form-group">
            <label>product id</label>
            <input type="text" name="id" placeholder="product id"></textarea>
        </div>

        <button class="btn" type="submit">Save Product</button>
    </form>
</div>

</body>
</html>
