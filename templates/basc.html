{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleHub</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
        }

        /* ================= HEADER ================= */

        .main-header{
            background:#fff;
            border-bottom:1px solid #ddd;
            position:sticky;
            top:0;
            z-index:999;
        }

        .nav-container{
            width:90%;
            margin:auto;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 0;
        }

        /* Logo */

        .logo{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .logo img{
            width:45px;
            height:45px;
        }

        .logo span{
            font-size:25px;
            font-weight:bold;
            color:#222;
        }

        /* Navigation */

        .nav-menu{
            list-style:none;
            display:flex;
            align-items:center;
            gap:20px;
        }

        .nav-menu li{
            position:relative;
        }

        .nav-menu li a{
            text-decoration:none;
            color:#333;
            font-size:15px;
            font-weight:500;
            padding:8px 12px;
            border-radius:5px;
            transition:.3s;
        }

        .nav-menu li a:hover{
            background:#2874f0;
            color:#fff;
        }

        /* Dropdown */

        .dropdown-content{
            display:none;
            position:absolute;
            top:40px;
            left:0;
            background:#fff;
            min-width:170px;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
            border-radius:5px;
            overflow:hidden;
        }

        .dropdown-content a{
            display:block;
            padding:12px;
            color:#333;
        }

        .dropdown-content a:hover{
            background:#2874f0;
            color:#fff;
        }

        .dropdown:hover .dropdown-content{
            display:block;
        }

        /* Logout */

        .logout-btn{
            background:#2874f0;
            color:#fff !important;
        }

        .logout-btn:hover{
            background:#1f5edb !important;
        }

        /* Mobile */

        @media(max-width:768px){

            .nav-container{
                flex-direction:column;
                align-items:flex-start;
            }

            .nav-menu{
                flex-direction:column;
                width:100%;
                margin-top:15px;
            }

            .nav-menu li{
                width:100%;
            }

            .nav-menu li a{
                display:block;
            }

            .dropdown-content{
                position:static;
                box-shadow:none;
            }

        }

    </style>

</head>

<body>

<header class="main-header">

    <div class="nav-container">

        <!-- Logo -->

        <div class="logo">

            <img src="{% static 'images/logo.png' %}" alt="Logo">

            <span>StyleHub</span>

        </div>

        <!-- Navigation -->

        <ul class="nav-menu">

            <li>
                <a href="/home">Home</a>
            </li>

            <li>
                <a href="/product">Products</a>
            </li>

            <li>
                <a href="/cartt">
                    <i class="fa fa-shopping-cart"></i>
                    Cart
                </a>
            </li>

            <li>
                <a href="/profile">
                    Profile
                </a>
            </li>

            <li class="dropdown">

                <a href="#">
                    Category ▼
                </a>

                <div class="dropdown-content">

                    <a href="/viewcate/shirts">
                        Shirts
                    </a>

                    <a href="/viewcate/jeans">
                        Jeans
                    </a>

                    <a href="/viewcate/innerwear">
                        Innerwear
                    </a>

                </div>

            </li>

            <li>
                <a href="/logout" class="logout-btn">
                    Logout
                </a>
            </li>

        </ul>

    </div>

</header>

<!-- Your page content here -->

</body>
</html>
